<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>AI Sells</title>
  </head>
  <body>
    <main id="app">
      <header class="toolbar">
        <div class="toolbar-shell" aria-label="Simulation controls">
          <section class="toolbar-actions" aria-label="Controls">
            <button id="pause-button" class="icon-button" type="button" aria-label="Pause"></button>
            <button id="settings-button" type="button" aria-expanded="false" aria-controls="settings-panel">
              Settings
            </button>
            <button id="randomize-button" type="button">Randomize</button>
            <button
              id="sum-graph-button"
              class="sum-sparkline-button"
              type="button"
              aria-expanded="false"
              aria-controls="sum-graph-panel"
              aria-label="Open total sum graph"
            >
              <canvas id="sum-sparkline-canvas" width="160" height="48" aria-hidden="true"></canvas>
            </button>
            <output id="fps-output" class="fps-output" aria-label="Frames per second">-- fps</output>
          </section>

          <section class="toolbar-end" aria-label="Step scale and links">
            <label class="step-control">
              <span>Steps</span>
              <input id="steps-input" type="range" min="-6" max="8" step="1" value="0" />
              <output id="steps-output">2^0 (1)</output>
            </label>
            <a
              id="github-button"
              class="icon-button github-button"
              href="http://github.com/lukejagg/ai-cells"
              target="_blank"
              rel="noreferrer"
              aria-label="Open AI Sells on GitHub"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 .3C5.37.3 0 5.67 0 12.3c0 5.3 3.44 9.8 8.2 11.39.6.11.82-.26.82-.58v-2.04c-3.34.72-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.74.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.81 1.3 3.49 1 .11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.12-.3-.54-1.52.12-3.18 0 0 1-.32 3.3 1.23.96-.27 1.98-.4 3-.41 1.02.01 2.04.14 3 .41 2.29-1.55 3.29-1.23 3.29-1.23.65 1.66.24 2.88.12 3.18.77.84 1.23 1.91 1.23 3.22 0 4.61-2.8 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.69.83.57A12.01 12.01 0 0 0 24 12.3C24 5.67 18.63.3 12 .3Z" />
              </svg>
            </a>
          </section>
        </div>
      </header>

      <section id="settings-panel" class="settings-panel" hidden>
        <section class="settings-section" aria-label="Grid size">
          <h2>Size</h2>
          <div class="range-controls">
            <label>
              <span>Width</span>
              <span id="grid-width-cell"></span>
            </label>
            <label>
              <span>Height</span>
              <span id="grid-height-cell"></span>
            </label>
          </div>
        </section>

        <section class="settings-section" aria-label="State fill">
          <h2>State</h2>
          <div class="state-actions">
            <button id="fill-zeros-button" type="button">Zeros</button>
            <button id="fill-ones-button" type="button">Ones</button>
          </div>
        </section>

        <section class="settings-section" aria-label="Filter normalization">
          <h2>Normalize</h2>
          <div class="normalization-row">
            <div class="segmented-control" role="radiogroup" aria-label="Filter normalization">
              <label>
                <input type="radio" name="normalization" value="none" />
                <span>None</span>
              </label>
              <label>
                <input type="radio" name="normalization" value="sum" checked />
                <span>Sum</span>
              </label>
              <label>
                <input type="radio" name="normalization" value="l1" />
                <span>L1</span>
              </label>
              <label>
                <input type="radio" name="normalization" value="l2" />
                <span>L2</span>
              </label>
            </div>
            <label class="normalization-magnitude">
              <span>Magnitude</span>
              <span id="normalization-magnitude-cell"></span>
            </label>
          </div>
        </section>

        <section class="settings-section" aria-label="Activation function">
          <h2>Activation</h2>
          <div class="segmented-control activation-control" role="radiogroup" aria-label="Activation function">
            <label>
              <input type="radio" name="activation" value="identity" />
              <span>Identity</span>
            </label>
            <label>
              <input type="radio" name="activation" value="tanh" checked />
              <span>Tanh</span>
            </label>
            <label>
              <input type="radio" name="activation" value="abs" />
              <span>Abs</span>
            </label>
            <label>
              <input type="radio" name="activation" value="sin" />
              <span>Sin</span>
            </label>
            <label>
              <input type="radio" name="activation" value="inverse-gaussian" />
              <span>Inv Gauss</span>
            </label>
            <label>
              <input type="radio" name="activation" value="gaussian" />
              <span>Gaussian</span>
            </label>
          </div>
        </section>

        <section class="settings-section" aria-label="Display style">
          <h2>Display</h2>
          <div class="display-options">
            <div class="segmented-control color-control" role="radiogroup" aria-label="Color mode">
              <label>
                <input type="radio" name="color-mode" value="signed" checked />
                <span>Signed</span>
              </label>
              <label>
                <input type="radio" name="color-mode" value="foreground" />
                <span>Foreground</span>
              </label>
            </div>
            <label class="toggle-option">
              <input id="persistent-pixels-input" type="checkbox" aria-label="Persistent pixels" />
              <span>Persistent pixels</span>
            </label>
          </div>
        </section>

        <section class="settings-section" aria-label="Cursor brush">
          <h2>Cursor</h2>
          <div class="segmented-control cursor-shape-control" role="radiogroup" aria-label="Cursor shape">
            <label>
              <input type="radio" name="cursor-shape" value="box" checked />
              <span>Box</span>
            </label>
            <label>
              <input type="radio" name="cursor-shape" value="circle" />
              <span>Circle</span>
            </label>
          </div>
          <div class="range-controls">
            <label>
              <span>Radius</span>
              <span id="cursor-radius-cell"></span>
            </label>
            <label>
              <span>Value</span>
              <span id="cursor-value-cell"></span>
            </label>
          </div>
        </section>

        <section class="settings-section" aria-label="Randomize range">
          <h2>Range</h2>
          <div class="range-controls">
            <label>
              <span>Min</span>
              <span id="randomize-min-cell"></span>
            </label>
            <label>
              <span>Max</span>
              <span id="randomize-max-cell"></span>
            </label>
          </div>
        </section>

        <section class="settings-section" aria-label="Filter symmetry">
          <h2>Symmetry</h2>
          <div class="symmetry-options">
            <label>
              <input id="vertical-symmetry-input" type="checkbox" aria-label="Vertical symmetry" checked />
              <span>Vertical</span>
            </label>
            <label>
              <input id="horizontal-symmetry-input" type="checkbox" aria-label="Horizontal symmetry" checked />
              <span>Horizontal</span>
            </label>
            <label>
              <input id="full-symmetry-input" type="checkbox" aria-label="Full symmetry" />
              <span>Full</span>
            </label>
          </div>
        </section>

        <section class="settings-section" aria-label="Convolution filter">
          <h2>Filter</h2>
          <div id="settings-filter-grid" class="settings-filter-grid" aria-label="Editable filter values"></div>
        </section>

        <section class="settings-actions" aria-label="Randomize actions">
          <button id="settings-randomize-button" type="button">Randomize</button>
          <button id="randomize-state-button" type="button">Randomize State</button>
        </section>
      </section>

      <section id="sum-graph-panel" class="sum-graph-panel" aria-label="Total cell sum history" hidden>
        <header class="sum-graph-header">
          <div>
            <h2>Total Sum</h2>
            <output id="sum-graph-current">0.00</output>
          </div>
          <button id="sum-graph-close-button" class="icon-button" type="button" aria-label="Close total sum graph"></button>
        </header>
        <canvas id="sum-graph-canvas" width="1200" height="520" aria-label="Total sum over time"></canvas>
      </section>

      <section class="stage" aria-label="Automata canvas">
        <canvas id="automata-canvas"></canvas>
        <div id="error-panel" class="error-panel" hidden></div>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
